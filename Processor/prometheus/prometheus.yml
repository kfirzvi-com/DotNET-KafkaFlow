global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  # The KafkaFlow processor runs on the host (dotnet run) and exposes /metrics on :8080.
  # host.docker.internal lets Prometheus (in Docker) reach a service on the Docker host.
  - job_name: "kafkaflow-processor"
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8080"]
        labels:
          service: "kafkaflow-processor"

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
